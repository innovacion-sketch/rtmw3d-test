<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sidhe · Espejo de pies 3D (RTMW3D + Three.js)</title>
<style>
  :root{
    --cyan:#1ca0db; --magenta:#ec008c; --yellow:#ffd200;
    --bg0:#0a0c12; --bg1:#12151f; --card:#161a26; --line:#252b3a;
    --txt:#eef1f7; --mut:#8b93a7;
  }
  * { margin: 0; box-sizing: border-box; }
  html,body{ height:100%; }
  body {
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(28,160,219,.10), transparent 60%),
      radial-gradient(1000px 600px at 100% 0%, rgba(236,0,140,.10), transparent 55%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
    color: var(--txt);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  }

  /* ---------- Header ---------- */
  #topbar{
    width:100%; display:flex; align-items:center; justify-content:space-between;
    gap:16px; padding:14px 22px;
    background: rgba(10,12,18,.6); backdrop-filter: blur(8px);
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:30;
  }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand .logo{ height:44px; width:auto; display:block;
    background:#fff; border-radius:12px; padding:6px 10px;
    box-shadow:0 4px 18px rgba(0,0,0,.35); }
  .brand .sub{ display:flex; flex-direction:column; line-height:1.15; }
  .brand .sub b{ font-size:15px; letter-spacing:.5px; }
  .brand .sub span{ font-size:12px; color:var(--mut); }
  .statuswrap{ display:flex; align-items:center; gap:16px; font-size:13px; }
  #conn{ font-weight:700; color:#e24b4a; display:flex; align-items:center; gap:6px; }
  #conn.ok{ color:#37d39b; }
  #fps{ color:var(--mut); font-variant-numeric:tabular-nums; min-width:120px; text-align:right; }
  .icon{
    background:var(--card); color:var(--txt); border:1px solid var(--line);
    width:40px; height:40px; border-radius:10px; cursor:pointer; font-size:18px;
    display:grid; place-items:center; transition:.15s;
  }
  .icon:hover{ border-color:var(--cyan); color:var(--cyan); }

  /* ---------- Main ---------- */
  main{ width:100%; max-width:960px; padding:22px 16px 40px;
    display:flex; flex-direction:column; align-items:center; gap:18px; }

  #stage {
    position: relative; width: 100%;
    background:#000; border-radius:18px; overflow:hidden;
    border:1px solid var(--line);
    box-shadow: 0 20px 60px rgba(0,0,0,.55);
  }
  #stage.mirror { }  /* el mirror se aplica solo a las capas de camara */
  #video, #overlay, #three { position:absolute; inset:0; width:100%; height:100%; }
  #video { position:relative; display:block; }
  #stage.mirror #video, #stage.mirror #overlay, #stage.mirror #three { transform: scaleX(-1); }

  #status{ font-size:13px; color:var(--mut); text-align:center; }

  /* ---------- Catálogo ---------- */
  .catalog{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .catalog button{
    background:var(--card); color:var(--txt);
    border:1px solid var(--line); border-radius:14px;
    padding:12px 18px; cursor:pointer; font-size:14px; font-weight:600;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    min-width:120px; transition:.15s;
  }
  .catalog button small{ font-weight:500; color:var(--mut); font-size:11px; }
  .catalog button:hover{ transform:translateY(-2px); border-color:var(--cyan); }
  .catalog button.active{
    border-color:transparent;
    background:linear-gradient(135deg, var(--magenta), #b6006e);
    box-shadow:0 8px 22px rgba(236,0,140,.35);
  }
  .catalog button.active small{ color:rgba(255,255,255,.8); }

  /* ---------- Acciones ---------- */
  .actions{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .cta{
    background:linear-gradient(135deg, var(--cyan), #1580b3);
    color:#fff; border:none; border-radius:14px;
    padding:14px 26px; font-size:16px; font-weight:700; cursor:pointer;
    box-shadow:0 10px 26px rgba(28,160,219,.35); transition:.15s;
  }
  .cta:hover{ transform:translateY(-2px); filter:brightness(1.06); }

  /* ---------- Panel admin (oculto para el cliente) ---------- */
  #adminPanel{
    width:100%; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:18px; margin-top:6px;
  }
  #adminPanel.hidden{ display:none; }
  #adminPanel h4{ font-size:12px; text-transform:uppercase; letter-spacing:1px;
    color:var(--mut); margin-bottom:14px; }
  .adminRow{ display:flex; gap:18px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
  .adminRow label{ display:flex; align-items:center; gap:6px; font-size:13px; color:var(--txt); }
  .sliders{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; }
  .sliders label{ display:flex; flex-direction:column; gap:6px; font-size:12px; color:var(--mut); }
  .sliders input[type=range]{ width:100%; accent-color:var(--cyan); }
  #adminPanel button{
    background:var(--bg1); color:var(--txt); border:1px solid var(--line);
    border-radius:10px; padding:9px 14px; cursor:pointer; font-size:13px;
  }
  #adminPanel button:hover{ border-color:var(--cyan); }
  .adminFile{ display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px; }

  /* ---------- Attract (pantalla de atracción) ---------- */
  #attract{
    position:absolute; inset:0; z-index:10; overflow:hidden;
    background:
      radial-gradient(800px 500px at 30% 20%, rgba(28,160,219,.25), transparent 60%),
      radial-gradient(800px 500px at 75% 80%, rgba(236,0,140,.25), transparent 60%),
      #06070c;
    display:flex; align-items:center; justify-content:center;
    transition:opacity .6s; pointer-events:none;
  }
  #attract.hidden{ opacity:0; }
  #attractVideo{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.55; }
  #attractMsg{ position:relative; z-index:2; text-align:center; color:#fff;
    display:flex; flex-direction:column; align-items:center; gap:18px; }
  #attractMsg .logoBig{ width:min(46%,340px); background:#fff; border-radius:26px;
    padding:22px 26px; box-shadow:0 20px 60px rgba(0,0,0,.5);
    animation:floaty 3.5s ease-in-out infinite; }
  #attractMsg .tagline{ font-size:clamp(18px,3vw,30px); font-weight:600; letter-spacing:.3px;
    text-shadow:0 2px 20px rgba(0,0,0,.8); }
  #attractMsg .pulse{ font-size:clamp(13px,1.6vw,16px); color:#cfd6e6;
    display:flex; align-items:center; gap:8px; }
  #attractMsg .dot{ width:9px; height:9px; border-radius:50%; background:var(--yellow);
    animation:blink 1.4s ease-in-out infinite; }
  @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-10px); } }
  @keyframes blink{ 0%,100%{ opacity:.35; } 50%{ opacity:1; } }
</style>
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <img class="logo" src="public/logo.png" alt="SIDHE" />
      <div class="sub"><b>Probador Virtual</b><span>Pruébate tus tenis en 3D</span></div>
    </div>
    <div class="statuswrap">
      <span id="conn">● desconectado</span>
      <span id="fps">— FPS</span>
      <button id="adminBtn" class="icon" title="Ajustes">⚙</button>
    </div>
  </header>

  <main>
    <div id="stage">
      <canvas id="video"></canvas>
      <canvas id="overlay"></canvas>
      <canvas id="three"></canvas>
      <div id="attract">
        <video id="attractVideo" loop muted playsinline></video>
        <div id="attractMsg">
          <img class="logoBig" src="public/logo.png" alt="SIDHE" />
          <div class="tagline">Acércate para probártelos 👟</div>
          <div class="pulse"><span class="dot"></span> Colócate frente al espejo</div>
        </div>
      </div>
    </div>

    <span id="status">Conectando con el server RTMW3D…</span>

    <div class="catalog" id="catalog"></div>

    <div class="actions">
      <button id="photoBtn" class="cta">📸 Guardar foto</button>
    </div>

    <div id="adminPanel" class="hidden">
      <h4>Ajustes (modo instalación)</h4>
      <div class="adminRow">
        <label><input type="checkbox" id="mirrorChk" checked /> Espejo</label>
        <label><input type="checkbox" id="debugChk" /> Ver puntos</label>
        <label class="adminFile">🎬 Video de marca
          <input type="file" id="attractFile" accept="video/*" style="display:none;" />
        </label>
        <button id="flipL">Voltear pie izq</button>
        <button id="resetAdj">Reset ajustes</button>
      </div>
      <div class="sliders">
        <label>Escala <input type="range" id="adjScale" min="0.5" max="3" step="0.05" value="1.35" /></label>
        <label>Alto <input type="range" id="adjY" min="-0.3" max="0.3" step="0.01" value="-0.05" /></label>
        <label>Frente <input type="range" id="adjX" min="-0.3" max="0.3" step="0.01" value="-0.02" /></label>
        <label>Giro <input type="range" id="adjRot" min="-3.15" max="3.15" step="0.05" value="0" /></label>
        <label>Perspectiva <input type="range" id="adjZGain" min="-600" max="600" step="10" value="120" /></label>
        <label>Cabeceo <input type="range" id="adjPitch" min="0" max="0.8" step="0.05" value="0.3" /></label>
        <label>Proporción <input type="range" id="adjLW" min="1.5" max="3.5" step="0.1" value="2.6" /></label>
        <label>Apertura <input type="range" id="adjYaw" min="0" max="1" step="0.05" value="0.5" /></label>
      </div>
    </div>
  </main>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

// ===== FUENTE DE TRACKING: server RTMW3D por WebSocket =====
const WS_URL = 'ws://localhost:8765';
// Los scores de RTMW3D están calibrados distinto que la "visibility" de
// MediaPipe: un pie bien visible da ~0.5-0.8, oculto da <0.3.
const MIN_VIS = 0.35;

// ===== CATÁLOGO DE TENIS =====
// Copia los .glb a public/models/ junto a este archivo.
// orient (opcional): [x,y,z] en radianes para corregir la orientacion del
// modelo si su fuente trae otros ejes que los Converse (largo=X, arriba=Y).
const CATALOG = [
  { id: 'onda',      name: 'Onda · Sidhe',     path: 'public/models/ONDA.glb',      scale: 1.0, orient: [0, 0, 0] },
  { id: 'estratos',  name: 'Estratos · Sidhe', path: 'public/models/Estratos.glb',  scale: 1.0, orient: [0, 0, 0] },
  { id: 'converse',  name: 'Converse',   path: 'public/models/converseShoe.glb',  scale: 1.0 },
  { id: 'converse2', name: 'Converse 2', path: 'public/models/converseShoe2.glb', scale: 1.0 },
  { id: 'ballerina', name: 'Ballerina',  path: 'public/models/ballerinaShoe.glb', scale: 1.2 },
];
let currentShoe = CATALOG[0];

// Ajustes en vivo del anclado (se controlan con los sliders)
// zGain: convierte la profundidad z de RTMW3D a "pixeles" para inclinar el
// tenis cuando el pie apunta a la camara. Se calibra con el slider
// Perspectiva; si el tenis gira al reves, moverlo a negativo.
// pitch: ZONA MUERTA del cabeceo en radianes. La camara baja "inclina" el
// pie en pantalla aunque este plano (~0.3 rad); se descuenta ese sesgo y lo
// que sobre (pie en puntas de verdad) si inclina el tenis.
// lenOverWidth: proporcion largo/ancho del pie real (~2.6). Estima el
// tamaño del tenis de frente, cuando el pie se ve "corto" pero ancho.
// yaw: cuanto se respeta la apertura lateral de los pies cuando apuntan a
// la camara (1 = tal cual la ve el modelo; <1 = menos "splay", mas natural).
const ADJ = { scale: 1.35, offY: -0.05, offX: -0.02, rot: 0, zGain: 120, pitch: 0.3, lenOverWidth: 2.6, yaw: 0.5 };

// ===== One Euro Filter (suaviza) =====
class LowPass { constructor(){this.y=null;} filter(x,a){this.y=this.y===null?x:a*x+(1-a)*this.y;return this.y;} }
function alpha(dt,c){const r=2*Math.PI*c*dt;return r/(r+1);}
class OneEuro {
  constructor(minC=1,beta=0,dC=1){this.minC=minC;this.beta=beta;this.dC=dC;this.xf=new LowPass();this.dxf=new LowPass();this.tPrev=null;this.xPrev=null;}
  filter(x,t){
    if(this.tPrev===null){this.tPrev=t;this.xPrev=x;this.xf.filter(x,1);this.dxf.filter(0,1);return x;}
    const dt=Math.max((t-this.tPrev)/1000,1e-6);
    const dx=(x-this.xPrev)/dt;
    const edx=this.dxf.filter(dx,alpha(dt,this.dC));
    const cutoff=this.minC+this.beta*Math.abs(edx);
    const out=this.xf.filter(x,alpha(dt,cutoff));
    this.tPrev=t;this.xPrev=x;return out;
  }
}
// Calibrado para RTMW3D a ~11 FPS: los puntos ya son estables, el filtro
// solo pule. (Los valores viejos 0.35/0.15 eran para MediaPipe a 30 FPS y
// metian ~0.5 s de retraso: el tenis "flotaba" detras del pie al moverse.)
const SMOOTH = { minCutoff: 2.0, beta: 0.8 };
const smoothers = {};
function sm(id, val, t){
  if(!smoothers[id]) smoothers[id] = new OneEuro(SMOOTH.minCutoff, SMOOTH.beta);
  return smoothers[id].filter(val, t);
}
function smoothLM(id, lm, t){
  return { x: sm(id+'x', lm.x, t), y: sm(id+'y', lm.y, t), z: sm(id+'z', lm.z, t), visibility: lm.visibility };
}

// ===== DOM =====
const videoCanvas = document.getElementById('video');
const vctx = videoCanvas.getContext('2d');
const overlay = document.getElementById('overlay');
const octx = overlay.getContext('2d');
const threeCanvas = document.getElementById('three');
const statusEl = document.getElementById('status');
const fpsEl = document.getElementById('fps');
const connEl = document.getElementById('conn');
const mirrorChk = document.getElementById('mirrorChk');
const debugChk = document.getElementById('debugChk');
const stage = document.getElementById('stage');
const catalogEl = document.getElementById('catalog');
const photoBtn = document.getElementById('photoBtn');
const attractEl = document.getElementById('attract');
const attractVideo = document.getElementById('attractVideo');
const attractFile = document.getElementById('attractFile');

// ===== Modo attract: máquina de estados con tiempos de gracia =====
const ATTRACT = {
  active: true,
  enterDelayMs: 800,
  exitDelayMs: 2500,
  detectedSince: 0,
  lostSince: 0,
};
function setAttract(on){
  if(ATTRACT.active === on) return;
  ATTRACT.active = on;
  attractEl.classList.toggle('hidden', !on);
  if(on){ attractVideo.play().catch(()=>{}); }
}
function updateAttract(hasFeet, now){
  if(hasFeet){
    ATTRACT.lostSince = 0;
    if(!ATTRACT.detectedSince) ATTRACT.detectedSince = now;
    if(ATTRACT.active && now - ATTRACT.detectedSince > ATTRACT.enterDelayMs){
      setAttract(false);
    }
  } else {
    ATTRACT.detectedSince = 0;
    if(!ATTRACT.lostSince) ATTRACT.lostSince = now;
    if(!ATTRACT.active && now - ATTRACT.lostSince > ATTRACT.exitDelayMs){
      setAttract(true);
    }
  }
}

// ===== Three.js =====
let renderer, scene, camera;
let shoeLeft = null, shoeRight = null;
const loader = new GLTFLoader();

function initThree(w, h){
  renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true, preserveDrawingBuffer: true });
  renderer.setSize(w, h, false);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;   // look mas cinematografico
  renderer.toneMappingExposure = 1.15;
  scene = new THREE.Scene();
  camera = new THREE.OrthographicCamera(0, w, 0, h, -2000, 2000);
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const key = new THREE.DirectionalLight(0xffffff, 2.4);   // luz principal
  key.position.set(0.4, -1, 1); scene.add(key);
  const fill = new THREE.DirectionalLight(0xffffff, 0.9);  // relleno lado opuesto
  fill.position.set(-0.6, -0.3, 0.7); scene.add(fill);
  const rim = new THREE.DirectionalLight(0xffffff, 0.7);   // contra desde atras
  rim.position.set(0, 0.4, -1); scene.add(rim);
}

function loadShoePair(){
  [shoeLeft, shoeRight].forEach(s => { if(s) scene.remove(s); });
  shoeLeft = null; shoeRight = null;

  loader.load(currentShoe.path, (gltf) => {
    // Orientacion por-modelo: se rota el modelo crudo dentro de un grupo
    // ANTES de medir/centrar, para que fuentes con otros ejes queden como
    // los Converse (largo=X, arriba=Y, ancho=Z).
    const base = new THREE.Group();
    base.add(gltf.scene);
    if(currentShoe.orient) gltf.scene.rotation.set(...currentShoe.orient);
    base.updateMatrixWorld(true);
    const box = new THREE.Box3().setFromObject(base);
    const c = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    // Centrar el CONTENIDO (no el grupo) para que valga aunque el modelo
    // no venga centrado en su origen (tipico de STL exportados).
    gltf.scene.position.sub(c);
    const maxDim = Math.max(size.x, size.y, size.z);
    base.scale.setScalar(1/maxDim);

    const wrapL = new THREE.Group();
    const modelL = base.clone();
    modelL.scale.z *= -1;
    wrapL.add(modelL);
    wrapL.visible = false;
    const wrapR = new THREE.Group(); wrapR.add(base.clone()); wrapR.visible = false;
    scene.add(wrapL); scene.add(wrapR);
    shoeLeft = wrapL; shoeRight = wrapR;
    statusEl.textContent = `Modelo "${currentShoe.name}" cargado`;
  }, undefined, (err) => {
    statusEl.textContent = `No cargó ${currentShoe.path} — ¿copiaste el .glb? (y abre esta página por http, no file://)`;
    console.error(err);
  });
}

function updateShoe(group, sideId, heel, toe, smallToe, w, h, t){
  if(!group) return;

  // Puntos en 3D: x,y en pixeles de pantalla; z de RTMW3D convertida a
  // "pixeles" con zGain, relativa al promedio local (solo importa el delta).
  const zRef = (heel.z + toe.z + smallToe.z) / 3;
  const p3 = lm => new THREE.Vector3(
    lm.x*w, lm.y*h, (zRef - lm.z) * ADJ.zGain);
  const H = p3(heel), T = p3(toe), S = p3(smallToe);

  // Eje largo del pie: talon -> centro de los dedos, en 3D
  const M = T.clone().add(S).multiplyScalar(0.5);
  const fwd = M.clone().sub(H);
  const rawLen = fwd.length();
  // Limites de sanidad: descarta frames glitch (tenis gigante/enano)
  if(rawLen < 5 || rawLen > h*0.6){ group.visible = false; return; }
  fwd.normalize();

  // Modelo kiosco: el pie esta sobre el piso. La orientacion se descompone
  // en RUMBO (giro sobre el piso: libre) + CABECEO (atenuado con ADJ.pitch,
  // porque de frente la inclinacion de la camara "inclina" el pie en
  // pantalla aunque este plano). El tenis nunca rueda: suela al piso.
  // Apertura (splay): de frente, la direccion del pie depende sobre todo de
  // z (dato ruidoso) y los tenis se abren de mas. Se atenua la componente
  // lateral SOLO cuando el pie apunta a la camara; de lado (bien
  // condicionado, manda fwd.x) no se toca.
  const frontal = Math.abs(fwd.z) / (Math.abs(fwd.x) + Math.abs(fwd.z) + 1e-6);
  const fx = fwd.x * (1 - frontal * (1 - ADJ.yaw));
  const horiz = Math.hypot(fx, fwd.z);
  const rumbo = Math.atan2(fwd.z, fx);
  // Zona muerta: se descuenta el cabeceo aparente que mete la inclinacion
  // de la camara (ADJ.pitch rad); lo que sobra es cabeceo real (pie en puntas)
  const rawPitch = Math.atan2(-fwd.y, horiz);
  const cabeceo = Math.sign(rawPitch) *
    Math.max(0, Math.abs(rawPitch) - ADJ.pitch);
  const f = new THREE.Vector3(
    Math.cos(rumbo) * Math.cos(cabeceo),
    -Math.sin(cabeceo),
    Math.sin(rumbo) * Math.cos(cabeceo));

  // "Arriba" = vertical de pantalla ortogonalizada contra el eje del pie
  const up = new THREE.Vector3(0, -1, 0);
  up.addScaledVector(f, -up.dot(f)).normalize();
  const side = new THREE.Vector3().crossVectors(f, up);

  // El GLB tiene: largo=X, arriba=Y, ancho=Z
  const basis = new THREE.Matrix4().makeBasis(f, up, side);
  const q = new THREE.Quaternion().setFromRotationMatrix(basis);
  if(ADJ.rot !== 0){
    const qz = new THREE.Quaternion()
      .setFromAxisAngle(new THREE.Vector3(0,0,1), ADJ.rot);
    q.premultiply(qz);
  }

  // Tamaño robusto a la orientacion: de frente el pie se "acorta" en
  // pantalla (foreshortening) y el tenis encogia. El ancho del pie
  // (gordo<->chico) es maximo justo de frente; se toma el mayor entre el
  // largo 3D y ancho*proporcion -> tamaño estable en todos los angulos.
  const width2d = Math.hypot(T.x - S.x, T.y - S.y);
  const sizeRaw = Math.max(rawLen, width2d * ADJ.lenOverWidth);
  const len = sm(sideId + '_len', sizeRaw, t);

  // Centro entre talon y dedos + offsets a lo largo/alto del pie en pantalla
  let cx = (H.x + M.x)/2, cy = (H.y + M.y)/2;
  const angle = Math.atan2(M.y - H.y, M.x - H.x);
  cx += Math.cos(angle) * ADJ.offX * len - Math.sin(angle) * ADJ.offY * len;
  cy += Math.sin(angle) * ADJ.offX * len + Math.cos(angle) * ADJ.offY * len;

  // No se aplica directo: el loop de 60 FPS interpola hacia este objetivo
  group.visible = true;
  group.userData.target = {
    pos: new THREE.Vector3(cx, cy, 0),
    quat: q,
    scale: len * ADJ.scale * currentShoe.scale,
    shadow: { cx, cy: cy + len*0.22, len, angle },
  };
}

// ===== Adaptador RTMW3D: convierte el JSON del WS al formato que usaba MediaPipe =====
// El server manda pixeles; aquí se normaliza a 0..1 como hacía MediaPipe.
function lmDesdeWS(d, punto, w, h){
  return {
    x: d[punto][0] / w,
    y: d[punto][1] / h,
    z: d[punto][2],
    visibility: d.score[punto],
  };
}

function drawDebugPts(pts){
  const w = overlay.width, h = overlay.height;
  [['ankle','#3778dd'],['heel','#e24b4a'],['toe','#f0c000']].forEach(([k,color])=>{
    const lm = pts[k];
    if(!lm) return;
    octx.fillStyle = color;
    octx.beginPath(); octx.arc(lm.x*w, lm.y*h, 6, 0, Math.PI*2); octx.fill();
  });
}

// Sombra de contacto: elipse difuminada bajo el tenis (vende el "apoyado
// en el piso" y tapa la union con el zapato real)
function drawShadow(s){
  octx.save();
  octx.translate(s.cx, s.cy);
  octx.rotate(s.angle);
  octx.scale(1, 0.32);
  const g = octx.createRadialGradient(0, 0, 0, 0, 0, s.len * 0.62);
  g.addColorStop(0, 'rgba(0,0,0,0.42)');
  g.addColorStop(0.7, 'rgba(0,0,0,0.18)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  octx.fillStyle = g;
  octx.beginPath(); octx.arc(0, 0, s.len * 0.62, 0, Math.PI*2); octx.fill();
  octx.restore();
}

function processFoot(d, group, w, h, t, sideId){
  if(!d){ if(group) group.visible=false; return false; }
  let ankle    = lmDesdeWS(d, 'ankle', w, h);
  let heel     = lmDesdeWS(d, 'heel',  w, h);
  let toe      = lmDesdeWS(d, 'toe',   w, h);
  let smallToe = lmDesdeWS(d, 'small_toe', w, h);
  // la visibilidad NO depende del dedo chico (queda oculto en vista de perfil)
  const vis = Math.min(ankle.visibility, heel.visibility, toe.visibility);
  if(vis < MIN_VIS){ if(group) group.visible=false; return false; }
  heel     = smoothLM(sideId+'_heel',  heel,  t);
  toe      = smoothLM(sideId+'_toe',   toe,   t);
  smallToe = smoothLM(sideId+'_stoe',  smallToe, t);
  updateShoe(group, sideId, heel, toe, smallToe, w, h, t);
  group.userData.debug = { ankle, heel, toe };
  return true;
}

// ===== WebSocket: reemplaza a MediaPipe + getUserMedia =====
let frames = 0, lastFps = performance.now();
let serverFps = 0;
const frameImg = new Image();
let ultimoMsg = null;

function onMensaje(m){
  const w = m.w, h = m.h;
  if(videoCanvas.width !== w || videoCanvas.height !== h){
    videoCanvas.width = w; videoCanvas.height = h;
    overlay.width = w; overlay.height = h;
    threeCanvas.width = w; threeCanvas.height = h;
    stage.style.aspectRatio = `${w} / ${h}`;
    if(!renderer){ initThree(w, h); loadShoePair(); }
    else { renderer.setSize(w,h,false); camera.right=w; camera.bottom=h; camera.updateProjectionMatrix(); }
  }
  serverFps = m.fps;

  const procesar = () => {
    if(frameImg.src) vctx.drawImage(frameImg, 0, 0, w, h);
    const t = performance.now();
    const okL = processFoot(m.left,  shoeLeft,  w, h, t, 'left');
    const okR = processFoot(m.right, shoeRight, w, h, t, 'right');
    updateAttract(okL || okR, t);
    statusEl.textContent = ATTRACT.active ? 'Modo atracción'
      : (okL || okR ? 'Detectando…' : 'Sin pies visibles');
    frames++;
    const now = performance.now();
    if(now-lastFps>=1000){
      fpsEl.textContent = `${frames} FPS (server ${serverFps})`;
      frames=0; lastFps=now;
    }
  };

  if(m.img){
    frameImg.onload = procesar;
    frameImg.src = m.img;   // JPEG del server (la camara es exclusiva de el)
  } else {
    procesar();
  }
}

function conectar(){
  const ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    connEl.textContent = '● conectado'; connEl.className = 'ok';
    statusEl.textContent = 'Conectado al server RTMW3D';
  };
  ws.onclose = () => {
    connEl.textContent = '● desconectado'; connEl.className = '';
    statusEl.textContent = 'Server no disponible — ¿está corriendo bridge\\server.py? Reintentando…';
    if(shoeLeft) shoeLeft.visible=false;
    if(shoeRight) shoeRight.visible=false;
    setTimeout(conectar, 1500);
  };
  ws.onmessage = ev => { ultimoMsg = JSON.parse(ev.data); onMensaje(ultimoMsg); };
}

// ===== Captura de foto: compone video + tenis 3D en un canvas y descarga =====
function takePhoto(){
  if(!ultimoMsg){ statusEl.textContent = 'Aún no llega video del server'; return; }
  const w = overlay.width, h = overlay.height;
  if(renderer) renderer.render(scene, camera);
  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  const ctx = out.getContext('2d');

  if(mirrorChk.checked){ ctx.save(); ctx.translate(w, 0); ctx.scale(-1, 1); }

  ctx.drawImage(videoCanvas, 0, 0, w, h);
  ctx.drawImage(overlay, 0, 0, w, h);
  ctx.drawImage(threeCanvas, 0, 0, w, h);

  if(mirrorChk.checked){ ctx.restore(); }

  ctx.fillStyle = 'rgba(29,158,117,0.9)';
  ctx.font = `bold ${Math.round(h*0.04)}px system-ui, sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText('SIDHE', w - 20, h - 20);

  out.toBlob((blob)=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sidhe-tryon-${Date.now()}.png`;
    a.click();
    URL.revokeObjectURL(url);
    statusEl.textContent = 'Foto guardada ✓';
  }, 'image/png');
}

// Catálogo UI
function buildCatalog(){
  catalogEl.innerHTML = '';
  CATALOG.forEach((shoe, i) => {
    const b = document.createElement('button');
    // "Onda · Sidhe" -> titulo "Onda" + subtitulo "SIDHE"
    const parts = shoe.name.split('·').map(s => s.trim());
    const titulo = parts[0];
    const sub = parts[1] ? parts[1].toUpperCase() : 'Clásico';
    b.innerHTML = `<span>${titulo}</span><small>${sub}</small>`;
    if(i===0) b.classList.add('active');
    b.onclick = () => {
      currentShoe = shoe;
      catalogEl.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      if(renderer) loadShoePair();
    };
    catalogEl.appendChild(b);
  });
}

photoBtn.addEventListener('click', takePhoto);

attractFile.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  attractVideo.src = url;
  attractVideo.play().catch(()=>{});
  statusEl.textContent = 'Video de marca cargado';
});

document.getElementById('adjScale').addEventListener('input', e => ADJ.scale = parseFloat(e.target.value));
document.getElementById('adjY').addEventListener('input', e => ADJ.offY = parseFloat(e.target.value));
document.getElementById('adjX').addEventListener('input', e => ADJ.offX = parseFloat(e.target.value));
document.getElementById('adjRot').addEventListener('input', e => ADJ.rot = parseFloat(e.target.value));
document.getElementById('adjZGain').addEventListener('input', e => ADJ.zGain = parseFloat(e.target.value));
document.getElementById('adjPitch').addEventListener('input', e => ADJ.pitch = parseFloat(e.target.value));
document.getElementById('adjLW').addEventListener('input', e => ADJ.lenOverWidth = parseFloat(e.target.value));
document.getElementById('adjYaw').addEventListener('input', e => ADJ.yaw = parseFloat(e.target.value));
document.getElementById('resetAdj').addEventListener('click', () => {
  ADJ.scale = 1.35; ADJ.offY = -0.05; ADJ.offX = -0.02; ADJ.rot = 0; ADJ.zGain = 120; ADJ.pitch = 0.3; ADJ.lenOverWidth = 2.6; ADJ.yaw = 0.5;
  document.getElementById('adjScale').value = 1.35;
  document.getElementById('adjY').value = -0.05;
  document.getElementById('adjX').value = -0.02;
  document.getElementById('adjRot').value = 0;
  document.getElementById('adjZGain').value = 120;
  document.getElementById('adjPitch').value = 0.3;
  document.getElementById('adjLW').value = 2.6;
  document.getElementById('adjYaw').value = 0.5;
});
document.getElementById('flipL').addEventListener('click', () => {
  if(!shoeLeft) return;
  const m = shoeLeft.children[0];
  window._flipState = ((window._flipState ?? 0) + 1) % 3;
  m.scale.set(Math.abs(m.scale.x), Math.abs(m.scale.y), Math.abs(m.scale.z));
  if(window._flipState === 0) m.scale.z *= -1;
  else if(window._flipState === 1) m.scale.x *= -1;
  statusEl.textContent = 'Volteo pie izq: ' + ['Z','X','ninguno'][window._flipState];
});
mirrorChk.addEventListener('change', ()=> stage.classList.toggle('mirror', mirrorChk.checked));
stage.classList.toggle('mirror', mirrorChk.checked);

// Boton engranaje: muestra/oculta el panel de ajustes (oculto para el cliente)
document.getElementById('adminBtn').addEventListener('click', () => {
  document.getElementById('adminPanel').classList.toggle('hidden');
});

buildCatalog();

// ===== Loop de render a 60 FPS: interpola hacia el ultimo dato del server =====
// El server manda ~11 FPS; el tenis "persigue" su objetivo cada frame de
// pantalla, asi el movimiento se ve continuo en vez de a saltos.
let lastRaf = performance.now();
function rafLoop(){
  const now = performance.now();
  const dt = Math.min((now - lastRaf)/1000, 0.1);
  lastRaf = now;
  const k = 1 - Math.exp(-dt * 12);   // constante de persecucion

  if(overlay.width) octx.clearRect(0, 0, overlay.width, overlay.height);
  for(const g of [shoeLeft, shoeRight]){
    if(!g) continue;
    if(!g.visible || !g.userData.target){ g.userData.snapped = false; continue; }
    const tgt = g.userData.target;
    if(!g.userData.snapped){
      // primera aparicion: saltar directo al objetivo (sin "volar" desde 0,0)
      g.position.copy(tgt.pos);
      g.quaternion.copy(tgt.quat);
      g.scale.setScalar(tgt.scale);
      g.userData.snapped = true;
    } else {
      g.position.lerp(tgt.pos, k);
      g.quaternion.slerp(tgt.quat, k);
      g.scale.setScalar(g.scale.x + (tgt.scale - g.scale.x) * k);
    }
    drawShadow(tgt.shadow);
    if(debugChk.checked && g.userData.debug) drawDebugPts(g.userData.debug);
  }
  if(renderer) renderer.render(scene, camera);
  requestAnimationFrame(rafLoop);
}
requestAnimationFrame(rafLoop);

conectar();   // arranca solo: modo kiosco, sin botón de inicio
</script>
